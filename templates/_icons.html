{# Inline, stroke-based SVG icons. Keeps the site image-free and crisp at any
   size. Usage: {% from "_icons.html" import icon %}{{ icon("bolt") }} #}
{% macro icon(name, cls="icon") -%}
<svg class="{{ cls }}" viewBox="0 0 24 24" fill="none" stroke="currentColor"
     stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"
     aria-hidden="true">
{%- if name == "faucet" -%}
  <path d="M3 12h6M6 12V8a3 3 0 0 1 3-3h2M11 5h4v4M15 9h3a2 2 0 0 1 2 2v1M11 12v4a3 3 0 0 0 3 3M9 12v9"/>
{%- elif name == "bolt" -%}
  <path d="M13 2 4 14h7l-1 8 9-12h-7l1-8Z"/>
{%- elif name == "snowflake" -%}
  <path d="M12 2v20M4.2 6.5 19.8 17.5M19.8 6.5 4.2 17.5M12 5l-2.5-2.5M12 5l2.5-2.5M12 19l-2.5 2.5M12 19l2.5 2.5"/>
{%- elif name == "hammer" -%}
  <path d="m14 5 5 5M3.5 20.5 12 12M9 7l4-4 3 3 4 4-3 3-4-4M13 11 9 7"/>
{%- elif name == "roller" -%}
  <rect x="3" y="4" width="12" height="5" rx="1"/><path d="M15 6h3a1 1 0 0 1 1 1v3a1 1 0 0 1-1 1h-6M11 11v3a2 2 0 0 1-2 2v4"/>
{%- elif name == "toolbox" -%}
  <rect x="3" y="8" width="18" height="12" rx="2"/><path d="M8 8V6a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M3 13h18M10 13v2h4v-2"/>
{%- elif name == "trowel" -%}
  <path d="M3 3 9 9M4 8l8 8 8-12-12 4M12 16l-2 5"/>
{%- elif name == "washer" -%}
  <rect x="4" y="2" width="16" height="20" rx="2"/><circle cx="12" cy="13" r="5"/><path d="M8 6h.01M11 6h.01"/>
{%- elif name == "phone" -%}
  <path d="M5 3h4l2 5-3 2a12 12 0 0 0 5 5l2-3 5 2v4a2 2 0 0 1-2 2A17 17 0 0 1 3 5a2 2 0 0 1 2-2Z"/>
{%- elif name == "whatsapp" -%}
  <path d="M21 12a9 9 0 0 1-13.3 7.9L3 21l1.2-4.6A9 9 0 1 1 21 12Z"/><path d="M8.5 9.5c0 3 2 5 5 5.5.6.1 1.2-.3 1.4-.9.1-.4-.1-.7-.5-.9l-1.3-.6-.9.9c-1-.5-1.7-1.2-2.2-2.2l.9-.9-.6-1.3c-.2-.4-.5-.6-.9-.5-.6.2-.9.7-.4 1.9Z"/>
{%- elif name == "check" -%}
  <path d="m5 12 5 5L20 7"/>
{%- elif name == "clock" -%}
  <circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/>
{%- elif name == "shield" -%}
  <path d="M12 3 5 6v5c0 4 3 7 7 9 4-2 7-5 7-9V6l-7-3Z"/><path d="m9 12 2 2 4-4"/>
{%- elif name == "star" -%}
  <path d="m12 3 2.6 5.3 5.8.8-4.2 4.1 1 5.8L12 16.9 6.8 19l1-5.8-4.2-4.1 5.8-.8L12 3Z" fill="currentColor" stroke="none"/>
{%- elif name == "pin" -%}
  <path d="M12 21s7-6 7-11a7 7 0 1 0-14 0c0 5 7 11 7 11Z"/><circle cx="12" cy="10" r="2.5"/>
{%- elif name == "arrow" -%}
  <path d="M5 12h14M13 6l6 6-6 6"/>
{%- elif name == "wallet" -%}
  <rect x="3" y="6" width="18" height="13" rx="2"/><path d="M3 10h18M16 14h2"/>
{%- elif name == "user" -%}
  <circle cx="12" cy="8" r="4"/><path d="M4 20a8 8 0 0 1 16 0"/>
{%- elif name == "mail" -%}
  <rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 6 9-6"/>
{%- else -%}
  <circle cx="12" cy="12" r="9"/>
{%- endif -%}
</svg>
{%- endmacro %}
